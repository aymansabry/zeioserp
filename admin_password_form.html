<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🔐 كلمة المرور - ZEIOS ERP</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #f0f2f5 0%, #e2e8f0 100%);
      padding: 20px;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      width: 100%;
      max-width: 420px;
      background: white;
      padding: 25px 30px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.15);
      animation: slideUp 0.3s ease;
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .card-header {
      text-align: center;
      margin-bottom: 25px;
      padding-bottom: 15px;
      border-bottom: 1px solid #e2e8f0;
    }
    .card-header h3 {
      color: #1a73e8;
      font-size: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .card-header .zeios-badge {
      background: #1a73e8;
      color: white;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      margin-right: 8px;
    }
    
    label {
      display: block;
      margin: 15px 0 6px;
      font-weight: 600;
      color: #334155;
      font-size: 14px;
    }
    .required:after { content: " *"; color: #dc2626; }
    
    input {
      width: 100%;
      padding: 12px 40px 12px 14px;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      font-size: 14px;
      transition: all 0.3s;
      background: #f8fafc;
    }
    input:focus {
      outline: none;
      border-color: #1a73e8;
      box-shadow: 0 0 0 3px rgba(26,115,232,0.1);
      background: white;
    }
    input::placeholder { color: #94a3b8; }
    
    .password-strength {
      height: 4px;
      background: #e2e8f0;
      border-radius: 2px;
      margin-top: 8px;
      overflow: hidden;
    }
    .password-strength-fill {
      height: 100%;
      width: 0%;
      transition: width 0.3s, background 0.3s;
      border-radius: 2px;
    }
    .password-strength-fill.weak { background: #dc2626; width: 33%; }
    .password-strength-fill.medium { background: #f59e0b; width: 66%; }
    .password-strength-fill.strong { background: #34a853; width: 100%; }
    
    button {
      background: linear-gradient(135deg, #1a73e8, #0d47a1);
      color: white;
      border: none;
      padding: 14px 20px;
      border-radius: 10px;
      cursor: pointer;
      width: 100%;
      font-size: 16px;
      font-weight: 600;
      margin-top: 25px;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    button:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(26,115,232,0.35);
    }
    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }
    
    .error, .success {
      margin-top: 15px;
      padding: 12px;
      border-radius: 8px;
      font-size: 14px;
      text-align: center;
      display: none;
    }
    .error {
      background: #fee2e2;
      color: #991b1b;
      border: 1px solid #fecaca;
    }
    .error.show { display: block; animation: shake 0.3s; }
    .success {
      background: #d1fae5;
      color: #065f46;
      border: 1px solid #a7f3d0;
    }
    .success.show { display: block; }
    
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      75% { transform: translateX(5px); }
    }
    
    .footer-note {
      text-align: center;
      font-size: 12px;
      color: #94a3b8;
      margin-top: 20px;
      padding-top: 15px;
      border-top: 1px solid #e2e8f0;
    }
    
    /* 👁️ TOGGLE PASSWORD VISIBILITY */
    .password-wrapper { position: relative; }
    
    .toggle-password {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: #64748b;
      cursor: pointer;
      padding: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 6px;
      transition: all 0.2s;
      z-index: 2;
    }
    .toggle-password:hover {
      background: #e2e8f0;
      color: #1a73e8;
    }
    .toggle-password:focus {
      outline: 2px solid #1a73e8;
      outline-offset: 2px;
    }
    .toggle-password svg {
      width: 18px;
      height: 18px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .toggle-password .eye-off { display: none; }
    .toggle-password.show .eye { display: none; }
    .toggle-password.show .eye-off { display: block; }
    
    /* RTL fix for input padding */
    input[type="password"], input[type="text"] {
      padding-left: 40px;
      padding-right: 14px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="card-header">
      <h3>
        <span class="zeios-badge">ZEIOS</span>
        🔐 كلمة مرور المسؤول
      </h3>
    </div>
    
    <label for="current" class="required">كلمة المرور الحالية</label>
    <div class="password-wrapper">
      <input type="password" id="current" placeholder="أدخل كلمة المرور المؤقتة أو الحالية" autocomplete="current-password">
      <button type="button" class="toggle-password" onclick="togglePassword('current')" aria-label="إظهار/إخفاء كلمة المرور">
        <!-- Eye Icon (visible) -->
        <svg class="eye" viewBox="0 0 24 24">
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
          <circle cx="12" cy="12" r="3"></circle>
        </svg>
        <!-- Eye-Off Icon (hidden) -->
        <svg class="eye-off" viewBox="0 0 24 24">
          <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
          <line x1="1" y1="1" x2="23" y2="23"></line>
        </svg>
      </button>
    </div>

    <label for="new" class="required">كلمة المرور الجديدة</label>
    <div class="password-wrapper">
      <input type="password" id="new" placeholder="6 أحرف على الأقل" oninput="checkStrength(this.value)" autocomplete="new-password">
      <button type="button" class="toggle-password" onclick="togglePassword('new')" aria-label="إظهار/إخفاء كلمة المرور">
        <svg class="eye" viewBox="0 0 24 24">
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
          <circle cx="12" cy="12" r="3"></circle>
        </svg>
        <svg class="eye-off" viewBox="0 0 24 24">
          <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
          <line x1="1" y1="1" x2="23" y2="23"></line>
        </svg>
      </button>
      <div class="password-strength"><div class="password-strength-fill" id="strengthFill"></div></div>
    </div>

    <label for="confirm" class="required">تأكيد كلمة المرور الجديدة</label>
    <div class="password-wrapper">
      <input type="password" id="confirm" placeholder="أعد إدخال كلمة المرور الجديدة" autocomplete="new-password">
      <button type="button" class="toggle-password" onclick="togglePassword('confirm')" aria-label="إظهار/إخفاء كلمة المرور">
        <svg class="eye" viewBox="0 0 24 24">
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
          <circle cx="12" cy="12" r="3"></circle>
        </svg>
        <svg class="eye-off" viewBox="0 0 24 24">
          <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
          <line x1="1" y1="1" x2="23" y2="23"></line>
        </svg>
      </button>
    </div>

    <button onclick="submit()" id="submitBtn">💾 حفظ كلمة المرور</button>
    
    <div id="error" class="error"></div>
    <div id="success" class="success"></div>
    
    <div class="footer-note">
      نظام ZEIOS ERP للمحاسبة • الإصدار 1.4
    </div>
  </div>

  <script>
    // ========== 👁️ TOGGLE PASSWORD VISIBILITY ==========
    function togglePassword(fieldId) {
      const field = document.getElementById(fieldId);
      const toggleBtn = field.nextElementSibling;
      
      if (field.type === 'password') {
        field.type = 'text';
        toggleBtn.classList.add('show');
        field.setAttribute('autocomplete', 'off');
      } else {
        field.type = 'password';
        toggleBtn.classList.remove('show');
        // Restore appropriate autocomplete
        if (fieldId === 'current') {
          field.setAttribute('autocomplete', 'current-password');
        } else {
          field.setAttribute('autocomplete', 'new-password');
        }
      }
      field.focus();
    }

    // ========== 🔐 PASSWORD STRENGTH CHECK ==========
    function checkStrength(password) {
      const fill = document.getElementById('strengthFill');
      if (!password) {
        fill.className = 'password-strength-fill';
        return;
      }
      let strength = 0;
      if (password.length >= 6) strength++;
      if (password.length >= 10) strength++;
      if (/[A-Z]/.test(password) && /[a-z]/.test(password) && /[0-9]/.test(password)) strength++;
      
      fill.className = 'password-strength-fill';
      if (strength === 1) fill.classList.add('weak');
      else if (strength === 2) fill.classList.add('medium');
      else if (strength >= 3) fill.classList.add('strong');
    }

    // ========== 📤 SUBMIT FORM - ✅ FIXED ==========
    function submit() {
      const current = document.getElementById('current').value.trim();
      const newPassword = document.getElementById('new').value.trim();
      const confirm = document.getElementById('confirm').value.trim();
      const error = document.getElementById('error');
      const success = document.getElementById('success');
      const btn = document.getElementById('submitBtn');

      // Reset messages
      error.className = 'error';
      success.className = 'success';
      error.textContent = '';
      success.textContent = '';

      // Validation
      if (!current || !newPassword || !confirm) {
        error.textContent = "⚠️ جميع الحقول مطلوبة.";
        error.classList.add('show');
        return;
      }
      if (newPassword.length < 6) {
        error.textContent = "❌ يجب أن تكون كلمة المرور 6 أحرف على الأقل.";
        error.classList.add('show');
        return;
      }
      if (newPassword !== confirm) {
        error.textContent = "❌ كلمات المرور غير متطابقة.";
        error.classList.add('show');
        return;
      }

      // Disable button during processing
      btn.disabled = true;
      btn.innerHTML = '⏳ جاري الحفظ...';

      // ✅ ✅ ✅ التعديل الأساسي: إرسال كائن واحد بالبيانات المطلوبة ✅ ✅ ✅
      google.script.run
        .withSuccessHandler(result => {
          btn.disabled = false;
          btn.innerHTML = '💾 حفظ كلمة المرور';
          
          if (result.success) {
            success.textContent = "✅ تم تحديث كلمة المرور! جاري الإغلاق...";
            success.classList.add('show');
            setTimeout(() => google.script.host.close(), 1500);
          } else {
            error.textContent = "❌ " + result.message;
            error.classList.add('show');
            document.getElementById('current').focus();
          }
        })
        .withFailureHandler(err => {
          btn.disabled = false;
          btn.innerHTML = '💾 حفظ كلمة المرور';
          error.textContent = "⚠️ خطأ في الاتصال: " + err;
          error.classList.add('show');
        })
        .validateAndChangePassword({
          oldPassword: current,
          newPassword: newPassword,
          confirmPassword: confirm
        });
    }

    // ========== ⌨️ ENTER KEY SUPPORT ==========
    document.addEventListener('keypress', function(e) {
      if (e.key === 'Enter') submit();
    });
  </script>
</body>
</html>
