<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>فاتورة مبيعات</title>

<style>

* {
    box-sizing: border-box;
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
    margin: 0;
    padding: 0;
}

html, body {
    width: 72mm;
    min-width: 72mm;
    max-width: 72mm;
    margin: 0 auto;
    padding: 0;
    background: #fff;
    font-family: 'Times New Roman', Times, serif;
    font-size: 8px;
    color: #000;
    line-height: 1.3;
}

body {
    padding: 2mm 3mm 2mm 3mm; /* هوامش يمين ويسار 3mm */
}

/* تحسينات للطباعة الحرارية - Xprinter */
@media print {
    @page {
        size: 72mm auto;
        margin: 0;
    }
    
    html, body {
        width: 72mm;
        margin: 0;
        padding: 2mm 3mm 2mm 3mm;
    }
    
    .no-print {
        display: none !important;
    }
    
    /* تكثيف المسافات للطباعة */
    .header, .info-section, .items-list, .totals-section {
        margin-bottom: 2mm;
    }
}

/* HEADER - حجم الخط 11 للشركة */
.header {
    text-align: center;
    margin-bottom: 2mm;
    border-bottom: 2px solid #000;
    padding-bottom: 1.5mm;
}

.company-name {
    font-size: 11px;
    font-weight: bold;
    letter-spacing: 0.5px;
    text-transform: uppercase;
}

.company-info {
    font-size: 7px;
    margin-top: 1mm;
    font-weight: normal;
}

.company-info span {
    display: inline-block;
}

/* TITLE - حجم الخط 10 */
.invoice-title {
    text-align: center;
    border-top: 1px solid #000;
    border-bottom: 1px solid #000;
    padding: 1.5mm 0;
    margin: 2mm 0;
    font-weight: bold;
    font-size: 10px;
    background: #fff;
}

/* INFO SECTION - حجم الخط 8 */
.info-section {
    font-size: 8px;
    margin-bottom: 2mm;
    border-bottom: 1px solid #000;
    padding-bottom: 1.5mm;
}

.info-row {
    display: flex;
    justify-content: space-between;
    margin-bottom: 1.5mm;
    padding: 0;
}

.label {
    font-weight: bold;
}

/* ITEMS SECTION - تحسين عرض المنتجات */
.items-list {
    padding-bottom: 1.5mm;
    margin-bottom: 1.5mm;
}

.product-item {
    margin-bottom: 2mm;
    page-break-inside: avoid;
    border-bottom: 1px dotted #aaa;
    padding-bottom: 1mm;
}

.p-name {
    font-weight: bold;
    font-size: 8px;
    text-align: right;
    margin-bottom: 0.5mm;
    word-break: break-word;
    padding-right: 0;
}

.p-calc {
    direction: ltr;
    text-align: right;
    font-size: 8px;
    font-family: 'Times New Roman', Times, serif;
    padding: 0.5mm 0;
    letter-spacing: 0.2px;
    font-weight: bold;
}

/* TOTALS SECTION - حجم الخط 10 */
.totals-section {
    font-size: 10px;
    border-top: 2px solid #000;
    padding-top: 1.5mm;
    margin-top: 1.5mm;
}

.t-row {
    display: flex;
    justify-content: space-between;
    margin-bottom: 1.5mm;
    padding: 0;
    font-weight: bold;
}

.grand-total {
    font-weight: bold;
    font-size: 11px;
    border-top: 2px solid #000;
    margin-top: 1.5mm;
    padding-top: 1.5mm;
    background: #fff;
}

/* PAYMENTS SECTION */
.payments {
    margin-top: 2mm;
    border-top: 1px solid #000;
    padding-top: 1.5mm;
}

.pay-title {
    text-align: center;
    font-weight: bold;
    font-size: 9px;
    margin-bottom: 1.5mm;
    background: #fff;
    padding: 0.5mm;
}

/* FOOTER - حجم الخط 10 */
.footer {
    text-align: center;
    margin-top: 3mm;
    padding-top: 1.5mm;
    border-top: 2px solid #000;
    font-size: 10px;
    line-height: 1.4;
    font-weight: bold;
}

.footer div:first-child {
    font-size: 10px;
    font-weight: bold;
}

.footer div:last-child {
    font-size: 7px;
    font-weight: normal;
    margin-top: 0.5mm;
}

/* QR CODE SECTION */
.qr-section {
    text-align: center;
    margin-top: 2mm;
    padding: 1mm;
}

.qr-section img {
    width: 20mm;
    height: 20mm;
}

/* BUTTONS */
.no-print {
    text-align: center;
    margin: 3mm 0;
    padding: 2mm;
    background: #f5f5f5;
    border-radius: 4px;
}

button {
    padding: 6px 12px;
    margin: 2px 4px;
    border: none;
    border-radius: 4px;
    background: #2196F3;
    color: white;
    font-size: 11px;
    cursor: pointer;
    font-family: 'Times New Roman', Times, serif;
}

button:hover {
    background: #1976D2;
}

button:last-child {
    background: #f44336;
}

button:last-child:hover {
    background: #d32f2f;
}

/* BARCODE */
.barcode {
    text-align: center;
    margin: 2mm 0;
    font-family: 'Free 3 of 9', 'Code 128', monospace;
    font-size: 14px;
}

/* RTL SPECIFIC */
[dir="rtl"] .p-calc {
    text-align: right;
    direction: rtl;
}

/* تحسين للشاشات الصغيرة */
@media screen and (max-width: 72mm) {
    html, body {
        width: 100%;
    }
}

/* دعم الطابعات الحرارية Xprinter */
@media print and (monochrome) {
    body {
        -webkit-filter: grayscale(100%);
        filter: grayscale(100%);
    }
    
    /* تكثيف إضافي لـ Xprinter */
    .info-row, .t-row {
        margin-bottom: 1mm;
    }
    
    .product-item {
        margin-bottom: 1.5mm;
    }
}

</style>
</head>
<body>

<div class="header">

<div class="company-name">
<?= data.company.name ?>
</div>

<div class="company-info">
<? if (data.company.address) { ?><?= data.company.address ?><? } ?>
<? if (data.company.phone) { ?> | ت: <?= data.company.phone ?><? } ?>
<? if (data.company.vat) { ?> | ض.م: <?= data.company.vat ?><? } ?>
</div>

</div>


<div class="invoice-title">
فاتورة <?= data.type_label ?> - #<?= data.invoice.invoice_no ?>
</div>


<div class="info-section">

<div class="info-row">
<span class="label">التاريخ:</span>
<span><?= data.invoice.invoice_date ?> <?= data.invoice.invoice_time ? ' ' . data.invoice.invoice_time : '' ?></span>
</div>

<div class="info-row">
<span class="label">العميل:</span>
<span><?= data.partner.name ?></span>
</div>

<? if (data.partner.phone) { ?>
<div class="info-row">
<span class="label">هاتف:</span>
<span><?= data.partner.phone ?></span>
</div>
<? } ?>

<? if (data.partner.vat) { ?>
<div class="info-row">
<span class="label">الرقم الضريبي:</span>
<span><?= data.partner.vat ?></span>
</div>
<? } ?>

</div>


<div class="items-list">

<? for (var i = 0; i < data.lines.length; i++) {

var name = data.lines[i].name || data.lines[i].item_name || 'صنف';
var color = data.lines[i].color_name || '';
var qty = data.lines[i].qty || data.lines[i].quantity || 0;
var price = data.lines[i].price || data.lines[i].unit_price || 0;
var total = data.lines[i].total || data.lines[i].subtotal || (qty*price) || 0;
var discount = data.lines[i].discount || 0;

var fullName = name;

if(color && color != 'بدون لون'){
fullName = name + " (" + color + ")";
}

?>

<div class="product-item">

<div class="p-name">
<?= fullName ?>
<? if(discount > 0) { ?> <span style="color: red;">(-<?= Number(discount).toFixed(2) ?>)</span><? } ?>
</div>

<div class="p-calc">
<?= Number(qty).toFixed(2) ?> × <?= Number(price).toFixed(2) ?> = <b><?= Number(total - discount).toFixed(2) ?></b>
</div>

</div>

<? } ?>

</div>


<div class="totals-section">

<div class="t-row">
<span>المجموع الفرعي:</span>
<span><?= Number(data.invoice.sub_total || 0).toFixed(2) ?></span>
</div>

<? if (data.invoice.discount > 0) { ?>
<div class="t-row">
<span>الخصم:</span>
<span style="color: red;">-<?= Number(data.invoice.discount).toFixed(2) ?></span>
</div>
<? } ?>

<? if (data.invoice.tax > 0) { ?>
<div class="t-row">
<span>الضريبة (<?= data.invoice.tax_rate || 15 ?>%):</span>
<span><?= Number(data.invoice.tax).toFixed(2) ?></span>
</div>
<? } ?>

<div class="t-row grand-total">
<span>الإجمالي:</span>
<span><?= Number(data.invoice.net_total || 0).toFixed(2) ?></span>
</div>

</div>


<? if (data.payments && data.payments.length > 0) { ?>

<div class="payments">

<div class="pay-title">
المدفوعات
</div>

<? for (var j=0;j<data.payments.length;j++){ ?>

<div class="info-row">
<span><?= data.payments[j].date ?> <?= data.payments[j].time ? ' ' . data.payments[j].time : '' ?></span>
<span><?= Number(data.payments[j].amount).toFixed(2) ?></span>
</div>

<? } ?>

<div class="t-row" style="font-weight:bold;border-top:1px solid #000;padding-top:1.5mm; margin-top:1.5mm;">

<span>إجمالي المدفوع:</span>
<span><?= Number(data.total_paid || 0).toFixed(2) ?></span>

</div>

<? if (data.remaining > 0) { ?>

<div class="t-row" style="color:red;font-weight:bold; font-size: 10px;">

<span>المتبقي:</span>
<span><?= Number(data.remaining).toFixed(2) ?></span>

</div>

<? } ?>

</div>

<? } ?>


<? if (data.barcode) { ?>
<div class="barcode">
<?= data.barcode ?>
</div>
<? } ?>

<? if (data.qr_code) { ?>
<div class="qr-section">
<img src="<?= data.qr_code ?>" alt="QR Code">
</div>
<? } ?>


<div class="footer">
<div>شكراً لتعاملكم معنا</div>
<div style="font-size: 8px; margin-top: 1mm;"><?= data.company.name ?> - جميع الحقوق محفوظة</div>
<div style="font-size: 7px;"><?= date('Y-m-d H:i:s') ?></div>
</div>


<div class="no-print">

<button onclick="window.print()">طباعة</button>
<button onclick="window.close()">إغلاق</button>
<button onclick="window.location.reload()">تحديث</button>

</div>

<script>
// Auto print on load (اختياري)
window.onload = function() {
    // يمكن تفعيل الطباعة التلقائية إذا أردت
    // window.print();
}

// دعم اختصار Ctrl+P
document.addEventListener('keydown', function(e) {
    if(e.ctrlKey && e.key === 'p') {
        e.preventDefault();
        window.print();
    }
});
</script>

</body>
</html>
