<!DOCTYPE html>
<html dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تفعيل الترخيص - ZEIOS ERP</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      padding: 30px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
    }
    .container {
      max-width: 500px;
      margin: 0 auto;
      background: #fff;
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    h2 {
      color: #667eea;
      text-align: center;
      margin-bottom: 10px;
      font-size: 24px;
    }
    .subtitle {
      text-align: center;
      color: #666;
      margin-bottom: 30px;
      font-size: 14px;
    }
    .form-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      margin-bottom: 8px;
      font-weight: bold;
      color: #333;
      font-size: 14px;
    }
    input {
      width: 100%;
      padding: 14px;
      border: 2px solid #ddd;
      border-radius: 10px;
      font-size: 15px;
      transition: border-color 0.3s;
    }
    input:focus {
      outline: none;
      border-color: #667eea;
    }
    button {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-size: 16px;
      font-weight: bold;
      transition: transform 0.2s;
    }
    button:hover {
      transform: translateY(-2px);
    }
    button:disabled {
      background: #ccc;
      cursor: not-allowed;
      transform: none;
    }
    .message {
      margin-top: 20px;
      padding: 15px;
      border-radius: 10px;
      text-align: center;
      display: none;
    }
    .success {
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }
    .error {
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
    }
    .info {
      background: #d1ecf1;
      color: #0c5460;
      border: 1px solid #bee5eb;
      margin-top: 20px;
      font-size: 13px;
    }
    .loading {
      text-align: center;
      color: #666;
      margin-top: 10px;
    }
    .support-link {
      text-align: center;
      margin-top: 20px;
    }
    .support-link a {
      color: #667eea;
      text-decoration: none;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>🔐 تفعيل الترخيص</h2>
    <p class="subtitle">أدخل مفتاح الترخيص لبدء استخدام النظام</p>
    
    <div class="form-group">
      <label for="licenseKey">مفتاح الترخيص</label>
      <input 
        type="text" 
        id="licenseKey" 
        placeholder="XXXX-XXXX-XXXX-XXXX"
        autocomplete="off"
      />
    </div>
    
    <button id="submitBtn" onclick="activateLicense()">تفعيل الترخيص</button>
    
    <div id="loading" class="loading" style="display: none;">
      جاري التفعيل...
    </div>
    
    <div id="message" class="message"></div>
    
    <div class="info">
      💡 تحصل على مفتاح الترخيص بعد التسجيل في الموقع الرسمي
    </div>
    
    <div class="support-link">
      <a href="#" onclick="contactSupport()">📞 تواصل مع الدعم الفني</a>
    </div>
  </div>

  <script>
    function activateLicense() {
      var btn = document.getElementById('submitBtn');
      var msg = document.getElementById('message');
      var loading = document.getElementById('loading');
      var licenseKey = document.getElementById('licenseKey').value.trim();
      
      if (!licenseKey) {
        msg.className = 'message error';
        msg.style.display = 'block';
        msg.innerHTML = '❌ يرجى إدخال مفتاح الترخيص';
        return;
      }
      
      btn.disabled = true;
      loading.style.display = 'block';
      msg.style.display = 'none';
      
      google.script.run
        .withSuccessHandler(function(response) {
          btn.disabled = false;
          loading.style.display = 'none';
          
          if (response.success) {
            msg.className = 'message success';
            msg.style.display = 'block';
            msg.innerHTML = '✅ ' + response.message;
            
            if (response.validation && response.validation.valid) {
              setTimeout(function() {
                google.script.host.close();
              }, 2000);
            }
          } else {
            msg.className = 'message error';
            msg.style.display = 'block';
            msg.innerHTML = '❌ ' + response.message;
          }
        })
        .withFailureHandler(function(error) {
          btn.disabled = false;
          loading.style.display = 'none';
          msg.className = 'message error';
          msg.style.display = 'block';
          msg.innerHTML = '❌ خطأ في الاتصال: ' + error;
        })
        .activateLicenseClient(licenseKey);
    }
    
    function contactSupport() {
      window.open('https://wa.me/201205951462', '_blank');
    }
    
    // دعم زر Enter
    document.getElementById('licenseKey').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') {
        activateLicense();
      }
    });
  </script>
</body>
</html>
